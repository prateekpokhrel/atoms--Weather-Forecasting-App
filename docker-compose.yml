services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: atoms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kiit
    ports:
      - "5433:5432"
    volumes:
      - atmos-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atoms"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  atmos-data:
